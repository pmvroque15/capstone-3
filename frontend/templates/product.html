{{#products}}
<div class="product">
    <div class="product-info">
        <div class="photo product-media">
            <img src="./images/products/{{displayImageUrl}}" alt=""
                 onclick="showImageDetailForm(`{{name}}`,'/images/products/{{displayImageUrl}}')"
            >
            <div class="price">${{price}}</div>
        </div>
        <h4>{{name}}</h4>
        <div>
            <p>{{description}}</p>
        </div>

    </div>
    <div class="purchase-controls">
        <div class="quantity-control" aria-label="Quantity">
            <button type="button" onclick="cartService.decreaseProductQuantity({{productId}})" aria-label="Decrease quantity">
                <i class="fa-solid fa-minus"></i>
            </button>
            <input
                type="number"
                id="quantity-{{productId}}"
                min="1"
                max="99"
                value="1"
                aria-label="Quantity for {{name}}"
            >
            <button type="button" onclick="cartService.increaseProductQuantity({{productId}})" aria-label="Increase quantity">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        <button class="btn btn-success" onclick="cartService.addQuantityToCart({{productId}})">
            <i class="fa-solid fa-cart-plus"></i>
            Add to Cart
        </button>
    </div>
    {{#isAdmin}}
    <div class="admin-card-actions">
        <button class="btn btn-outline-primary" onclick="productService.showEditProductForm({{productId}})">
            <i class="fa-solid fa-pen-to-square"></i>
            Edit
        </button>
        <button class="btn btn-outline-danger" onclick="productService.deleteProduct({{productId}})">
            <i class="fa-solid fa-trash"></i>
            Delete
        </button>
    </div>
    {{/isAdmin}}
</div>
{{/products}}
