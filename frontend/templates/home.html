<div class="filter-box">
    <h3>Filter</h3>

    <div id="admin-catalog-tools" class="admin-catalog-tools hidden">
        <button type="button" class="btn btn-success" onclick="productService.showAddProductForm()">
            <i class="fa-solid fa-plus"></i>
            Product
        </button>
        <button type="button" class="btn btn-outline-primary" onclick="categoryService.showAddCategoryForm()">
            <i class="fa-solid fa-plus"></i>
            Category
        </button>
        <div id="admin-category-list" class="admin-category-list"></div>
    </div>

    <div class="form-floating mb-3">
        <select name="" id="category-select" class="form-select"
            onchange="setCategory(this)"
        >
            <option value="0">Show All</option>
        </select>
        <label for="category-select">Category</label>
    </div>
    <div>
        <label for="min-price" class="form-label">Minimum Price: $ <span id="min-price-display">0</span></label>
        <input type="range" class="form-range" id="min-price" min="0" max="200" value="0" onchange="setMinPrice(this)">
    </div>
    <div>
        <label for="max-price" class="form-label">Maximum Price: $ <span id="max-price-display">200</span></label>
        <input type="range" class="form-range" id="max-price" min="0" max="200" value="200" onchange="setMaxPrice(this)">
    </div>

    <div class="form-floating mb-3">
        <select name="" id="subcategory-select" class="form-select"
                onchange="setSubcategory(this)"
        >
            <option value="">Show All</option>
            <option>Organic</option>
            <option>Fresh</option>
            <option>Frozen</option>
            <option>Canned</option>
            <option>Local</option>
            <option>Imported</option>
            <option>Low-Fat</option>
            <option>Vegan</option>
            <option>Natural</option>
            <option>Whole Grain</option>
            <option>Packaged</option>
        </select>
        <label for="subcategory-select">Type</label>
    </div>

</div>
<div id="content" class="content"></div>
